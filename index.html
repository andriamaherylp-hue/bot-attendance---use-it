<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UptimeRobot</title>

<!-- ===================== FAVICON ===================== -->
<!-- 
  INSTRUCTIONS POUR LE FAVICON & LOGO :
  1. Hébergez votre image logo sur un service (ex: Imgur, CDN, votre serveur)
  2. Remplacez LOGO_URL ci-dessous par l'URL de votre image
  3. Le favicon ET le logo dans la topbar seront mis à jour automatiquement
-->
<script>
  // ✏️ MODIFIEZ CETTE URL avec l'URL publique de votre logo MADA Attendance
  window.LOGO_URL = "https://i.postimg.cc/HjDsWXH2/photo-2026-05-13-17-13-04.jpg"; // Ex: "https://i.imgur.com/XXXXXXX.png"
  
  // Injection dynamique du favicon
  (function(){
    if(window.LOGO_URL){
      var link = document.createElement('link');
      link.rel = 'icon';
      link.type = 'image/png';
      link.href = window.LOGO_URL;
      document.head.appendChild(link);
    } else {
      // Fallback favicon emoji via canvas
      var canvas = document.createElement('canvas');
      canvas.width = 64; canvas.height = 64;
      var ctx = canvas.getContext('2d');
      ctx.font = '48px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('⏱', 32, 36);
      var link = document.createElement('link');
      link.rel = 'icon';
      link.href = canvas.toDataURL();
      document.head.appendChild(link);
    }
  })();
</script>

<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
/* ===================== RESET ===================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ===================== DARK THEME (default) ===================== */
:root {
  --bg:        #0d0f14;
  --bg2:       #151820;
  --bg3:       #1c1f2a;
  --bg4:       #232736;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.12);
  --text:      #e8eaf0;
  --text2:     #8b90a0;
  --text3:     #555b6e;
  --topbar-bg: rgba(13,15,20,0.92);
  --shadow:    rgba(0,0,0,0.35);
  --green:     #22d37a; --green-bg: rgba(34,211,122,0.1);  --green-b: rgba(34,211,122,0.25);
  --red:       #f04e5e; --red-bg:   rgba(240,78,94,0.1);   --red-b:   rgba(240,78,94,0.25);
  --amber:     #f5a623; --amber-bg: rgba(245,166,35,0.1);  --amber-b: rgba(245,166,35,0.25);
  --blue:      #4d9fff; --blue-bg:  rgba(77,159,255,0.1);  --blue-b:  rgba(77,159,255,0.25);
  --purple:    #a78bfa; --purple-bg:rgba(167,139,250,0.1);
  --accent:    #22d37a;
  --radius:10px; --radius-lg:14px; --radius-xl:18px;
  --transition: 0.2s ease;
}

/* ===================== LIGHT THEME ===================== */
html.light {
  --bg:        #f0f2f7;
  --bg2:       #ffffff;
  --bg3:       #f5f6fa;
  --bg4:       #eaecf3;
  --border:    rgba(0,0,0,0.07);
  --border2:   rgba(0,0,0,0.13);
  --text:      #141620;
  --text2:     #4a5068;
  --text3:     #9098b0;
  --topbar-bg: rgba(240,242,247,0.93);
  --shadow:    rgba(0,0,0,0.08);
  --green:     #16a85a; --green-bg: rgba(22,168,90,0.08);   --green-b: rgba(22,168,90,0.22);
  --red:       #d93447; --red-bg:   rgba(217,52,71,0.08);   --red-b:   rgba(217,52,71,0.22);
  --amber:     #c97a0a; --amber-bg: rgba(201,122,10,0.08);  --amber-b: rgba(201,122,10,0.22);
  --blue:      #1f6fd4; --blue-bg:  rgba(31,111,212,0.08);  --blue-b:  rgba(31,111,212,0.22);
  --purple:    #7c5cd6; --purple-bg:rgba(124,92,214,0.08);
  --accent:    #16a85a;
}

html { font-size: 15px; }
body {
  font-family: 'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; line-height: 1.5;
  transition: background var(--transition), color var(--transition);
}
button { cursor: pointer; font-family: inherit; }
input  { font-family: inherit; }

/* ===================== SCROLLBAR ===================== */
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--bg4); border-radius:3px; }

/* ===================== TOPBAR ===================== */
.topbar {
  position:sticky; top:0; z-index:200;
  background: var(--topbar-bg);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  height:60px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 24px;
  transition: background var(--transition), border-color var(--transition);
}

/* ===================== LOGO ===================== */
.logo {
  display:flex; align-items:center; gap:10px;
  font-size:15px; font-weight:600; letter-spacing:-0.01em;
}
.logo-img-wrap {
  width:38px; height:38px; border-radius:10px;
  overflow:hidden; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  /* Subtle shadow to make the logo pop */
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3));
}
.logo-img-wrap img {
  width:100%; height:100%; object-fit:contain;
}
/* Fallback icon when no image URL is set */
.logo-icon-fallback {
  width:38px; height:38px; border-radius:10px;
  background:linear-gradient(135deg,#22d37a,#4d9fff);
  display:flex; align-items:center; justify-content:center;
  font-size:18px; flex-shrink:0;
  filter: drop-shadow(0 2px 6px rgba(34,211,122,0.3));
}
.logo-text {
  display:flex; flex-direction:column; line-height:1.1;
}
.logo-title {
  font-size:15px; font-weight:700; letter-spacing:0.01em;
  background: linear-gradient(90deg, var(--text) 60%, var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.logo-sub {
  font-size:10px; font-weight:500; letter-spacing:0.08em;
  text-transform:uppercase; color:var(--text3);
  -webkit-text-fill-color: var(--text3);
}

.topbar-center { display:flex; align-items:center; gap:6px; }
.topbar-right  { display:flex; align-items:center; gap:8px; }

.tab-pill {
  display:flex; background:var(--bg3);
  border:1px solid var(--border); border-radius:999px; padding:3px; gap:2px;
}
.tab-pill button {
  padding:5px 14px; border:none; border-radius:999px;
  font-size:13px; font-weight:500;
  background:transparent; color:var(--text2); transition:all 0.18s;
}
.tab-pill button.active {
  background:var(--bg4); color:var(--text);
  box-shadow:0 1px 4px var(--shadow);
}

.live-indicator { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text2); }
.live-dot { width:7px; height:7px; border-radius:50%; background:var(--green); animation:blink 1.6s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
@keyframes spin  { to { transform:rotate(360deg); } }

/* Icon buttons */
.icon-btn {
  height:32px; border-radius:8px;
  border:1px solid var(--border2); background:var(--bg3);
  color:var(--text2); font-size:13px; font-weight:500;
  display:flex; align-items:center; justify-content:center; gap:5px;
  padding:0 10px; transition:all 0.15s; white-space:nowrap;
}
.icon-btn:hover { background:var(--bg4); color:var(--text); }
.icon-btn.sq { width:32px; padding:0; }
.icon-btn.spin svg { animation:spin 0.8s linear infinite; }

/* Settings dropdown */
.settings-wrap { position:relative; }
.settings-panel {
  position:absolute; top:38px; right:0; z-index:300;
  background:var(--bg2); border:1px solid var(--border2);
  border-radius:var(--radius-lg); padding:14px 16px;
  min-width:220px;
  box-shadow:0 8px 32px var(--shadow);
  display:flex; flex-direction:column; gap:14px;
}
.sp-title { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--text3); margin-bottom:4px; }
.sp-row { display:flex; align-items:center; justify-content:space-between; gap:12px; }
.sp-label { font-size:13px; color:var(--text2); }

/* Toggle switch */
.toggle { position:relative; display:inline-block; width:38px; height:21px; flex-shrink:0; }
.toggle input { opacity:0; width:0; height:0; }
.toggle-slider {
  position:absolute; cursor:pointer; inset:0;
  background:var(--bg4); border-radius:999px; transition:.2s;
}
.toggle-slider::before {
  content:''; position:absolute;
  width:15px; height:15px; left:3px; bottom:3px;
  background:var(--text2); border-radius:50%; transition:.2s;
}
.toggle input:checked + .toggle-slider { background:var(--accent); }
.toggle input:checked + .toggle-slider::before { transform:translateX(17px); background:#fff; }

/* Lang buttons */
.lang-btns { display:flex; gap:5px; }
.lang-btn {
  padding:4px 10px; border-radius:6px; font-size:12px; font-weight:600;
  border:1px solid var(--border2); background:transparent; color:var(--text2);
  transition:all 0.15s;
}
.lang-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
html.light .lang-btn.active { color:#fff; }
.lang-btn:hover:not(.active) { background:var(--bg3); color:var(--text); }

/* ===================== LAYOUT ===================== */
.app-shell { display:flex; min-height:calc(100vh - 60px); }

.sidebar {
  width:260px; flex-shrink:0;
  background:var(--bg2); border-right:1px solid var(--border);
  padding:16px 10px;
  display:flex; flex-direction:column; gap:4px;
  overflow-y:auto;
  transition: background var(--transition), border-color var(--transition);
}
.sidebar-label { font-size:10px; font-weight:600; letter-spacing:0.1em; color:var(--text3); text-transform:uppercase; padding:8px 10px 4px; }
.user-row { display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:var(--radius); cursor:pointer; transition:background 0.15s; border:1px solid transparent; }
.user-row:hover  { background:var(--bg3); }
.user-row.active { background:var(--bg3); border-color:var(--border2); }
.user-avatar { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; flex-shrink:0; }
.user-row-info { flex:1; min-width:0; }
.user-row-name { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.user-row-id   { font-size:11px; color:var(--text3); }
.status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.dot-present { background:var(--green); }
.dot-pause   { background:var(--amber); }
.dot-absent  { background:var(--text3); }

.main-content { flex:1; overflow-y:auto; padding:24px 28px; }

/* ===================== SECTION TITLE ===================== */
.section-title { font-size:11px; font-weight:600; letter-spacing:0.09em; color:var(--text3); text-transform:uppercase; margin-bottom:12px; }

/* ===================== PROFILE HEADER ===================== */
.profile-header {
  display:flex; align-items:flex-start; justify-content:space-between;
  background:var(--bg2); border:1px solid var(--border);
  border-radius:var(--radius-xl); padding:20px 24px; margin-bottom:20px;
  transition: background var(--transition), border-color var(--transition);
}
.profile-left  { display:flex; align-items:center; gap:16px; }
.profile-avatar { width:52px; height:52px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700; }
.profile-name  { font-size:18px; font-weight:600; letter-spacing:-0.01em; margin-bottom:2px; }
.profile-uid   { font-size:12px; color:var(--text3); font-family:monospace; }
.profile-right { display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
.status-badge  { display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:999px; font-size:12px; font-weight:600; }
.badge-present { background:var(--green-bg); border:1px solid var(--green-b); color:var(--green); }
.badge-pause   { background:var(--amber-bg); border:1px solid var(--amber-b); color:var(--amber); }
.badge-absent  { background:var(--bg4);      border:1px solid var(--border);  color:var(--text3); }
.badge-offwork { background:var(--blue-bg);  border:1px solid var(--blue-b);  color:var(--blue); }
.last-update   { font-size:11px; color:var(--text3); }

/* ===================== METRICS GRID ===================== */
.metrics-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin-bottom:20px; }
.metric-card {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:14px 16px;
  position:relative; overflow:hidden;
  transition: background var(--transition), border-color var(--transition);
}
.metric-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; border-radius:2px 2px 0 0; }
.metric-card.green::before  { background:var(--green); }
.metric-card.red::before    { background:var(--red); }
.metric-card.amber::before  { background:var(--amber); }
.metric-card.blue::before   { background:var(--blue); }
.metric-card.purple::before { background:var(--purple); }
.metric-label { font-size:10px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--text3); margin-bottom:6px; }
.metric-value { font-size:22px; font-weight:700; letter-spacing:-0.02em; line-height:1; }
.metric-sub   { font-size:11px; color:var(--text3); margin-top:3px; }
.metric-value.green  { color:var(--green); }
.metric-value.red    { color:var(--red); }
.metric-value.amber  { color:var(--amber); }
.metric-value.blue   { color:var(--blue); }
.metric-value.purple { color:var(--purple); }

/* ===================== TWO-COL ===================== */
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px; }

/* ===================== INFO CARD ===================== */
.info-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:16px 18px; transition: background var(--transition); }
.info-card-title { font-size:12px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--text3); margin-bottom:12px; }
.info-row { display:flex; align-items:center; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--border); }
.info-row:last-child { border-bottom:none; }
.info-row-label { font-size:13px; color:var(--text2); display:flex; align-items:center; gap:7px; }
.info-row-icon  { font-size:14px; width:18px; text-align:center; }
.info-row-val   { font-size:13px; font-weight:500; }
.val-green { color:var(--green); }
.val-red   { color:var(--red); }
.val-amber { color:var(--amber); }

/* ===================== PAUSE CARDS ===================== */
.pause-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
.pause-item { background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); padding:10px 12px; transition: background var(--transition); }
.pause-item-header { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--text2); margin-bottom:6px; }
.pause-item-emoji  { font-size:14px; }
.pause-count { font-size:18px; font-weight:700; }
.pause-dur   { font-size:11px; color:var(--text3); margin-top:1px; }

/* ===================== ACTIVE BREAK BANNER ===================== */
.break-banner { background:var(--amber-bg); border:1px solid var(--amber-b); border-radius:var(--radius-lg); padding:12px 16px; display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.break-banner-left  { display:flex; align-items:center; gap:10px; }
.break-banner-emoji { font-size:20px; }
.break-banner-label { font-size:13px; font-weight:600; color:var(--amber); }
.break-banner-since { font-size:11px; color:var(--text2); margin-top:1px; }
.break-banner-right { font-size:12px; color:var(--text3); }
.overdue { color:var(--red); font-weight:600; }

/* ===================== SESSIONS TABLE ===================== */
.sessions-table { width:100%; border-collapse:collapse; font-size:12px; }
.sessions-table th { text-align:left; padding:6px 8px; font-size:10px; font-weight:600; letter-spacing:0.07em; text-transform:uppercase; color:var(--text3); border-bottom:1px solid var(--border); }
.sessions-table td { padding:8px; border-bottom:1px solid var(--border); vertical-align:middle; }
.sessions-table tr:last-child td { border-bottom:none; }
.sessions-table tr:hover td { background:var(--bg3); }
.exceeded-pill { display:inline-block; padding:1px 7px; border-radius:999px; font-size:10px; font-weight:600; background:var(--red-bg); border:1px solid var(--red-b); color:var(--red); }
.ok-pill       { display:inline-block; padding:1px 7px; border-radius:999px; font-size:10px; font-weight:600; background:var(--green-bg); border:1px solid var(--green-b); color:var(--green); }

/* ===================== MONTHLY ===================== */
.monthly-metrics { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px; margin-bottom:20px; }
.chart-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:16px 18px; margin-bottom:20px; transition: background var(--transition); }
.chart-card-title { font-size:12px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--text3); margin-bottom:14px; }
.chart-wrap { position:relative; width:100%; height:200px; }
.monthly-table-wrap { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; transition: background var(--transition); }
.monthly-table-header { padding:12px 18px; border-bottom:1px solid var(--border); font-size:12px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--text3); display:flex; justify-content:space-between; align-items:center; }
.monthly-table { width:100%; border-collapse:collapse; font-size:12px; }
.monthly-table th { padding:8px 14px; text-align:left; font-size:10px; font-weight:600; letter-spacing:0.07em; text-transform:uppercase; color:var(--text3); border-bottom:1px solid var(--border); background:var(--bg3); }
.monthly-table td { padding:10px 14px; border-bottom:1px solid var(--border); }
.monthly-table tr:last-child td { border-bottom:none; }
.monthly-table tr:hover td { background:var(--bg3); }

/* ===================== EMPTY / ERROR ===================== */
.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:300px; color:var(--text3); gap:12px; }
.empty-icon  { font-size:40px; }
.empty-text  { font-size:14px; }
.error-banner { background:var(--red-bg); border:1px solid var(--red-b); border-radius:var(--radius); padding:10px 14px; font-size:13px; color:var(--red); margin-bottom:16px; display:flex; align-items:center; gap:8px; }

/* ===================== API CONFIG ===================== */
.config-bar { display:flex; flex-direction:column; align-items:stretch; gap:6px; background:var(--bg3); border:1px solid var(--border2); border-radius:var(--radius); padding:8px 10px; }
.config-bar input { background:transparent; border:none; outline:none; color:var(--text); font-size:12px; font-family:monospace; }
.config-bar input::placeholder { color:var(--text3); }
.apply-btn { padding:5px 12px; border-radius:6px; background:var(--accent); color:#fff; font-size:12px; font-weight:600; border:none; transition:opacity 0.15s; }
.apply-btn:hover { opacity:0.85; }

/* ===================== OFF WORK PANEL ===================== */
.offwork-panel { border-radius:var(--radius-xl); overflow:hidden; border:1px solid var(--border); margin-bottom:18px; }
.offwork-panel-header { padding:14px 20px; background:var(--bg3); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
.offwork-panel-title  { font-size:14px; font-weight:600; }
.offwork-panel-date   { font-size:12px; color:var(--text3); margin-left:auto; font-family:monospace; }
.offwork-cols { display:grid; grid-template-columns:1fr 1fr; min-height:160px; }
.offwork-col  { padding:16px 18px; background:var(--bg2); }
.offwork-col:first-child { border-right:1px solid var(--border); }
.offwork-col-title { font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:12px; display:flex; align-items:center; gap:7px; }
.col-ok    { color:var(--green); }
.col-alert { color:var(--red); }
.offwork-emp-row { display:flex; align-items:center; gap:10px; padding:7px 10px; border-radius:var(--radius); margin-bottom:5px; background:var(--bg3); border:1px solid var(--border); }
.offwork-emp-row.ok-row    { border-color:var(--green-b); background:var(--green-bg); }
.offwork-emp-row.alert-row { border-color:var(--red-b);   background:var(--red-bg); }
.offwork-emp-avatar { width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; }
.offwork-emp-name  { font-size:12px; font-weight:500; }
.offwork-emp-meta  { font-size:11px; color:var(--text3); margin-top:1px; }
.offwork-emp-badge { font-size:10px; font-weight:600; padding:2px 8px; border-radius:999px; white-space:nowrap; }
.badge-ok    { background:var(--green-bg); border:1px solid var(--green-b); color:var(--green); }
.badge-alert { background:var(--red-bg);   border:1px solid var(--red-b);   color:var(--red); }
.offwork-empty { font-size:12px; color:var(--text3); padding:10px 0; font-style:italic; }

/* ===================== CALENDAR ===================== */

// ===================== UTILS =====================
function fmtSec(s){
  if(!s||s<=0)return"0min";
  s=Math.round(s);
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;
  if(h>0)return`${h}h${String(m).padStart(2,'0')}min`;
  if(m>0&&sc>0)return`${m}min ${sc}s`;
  if(m>0)return`${m}min`;
  return`${sc}s`;
}
function fmtHM(s){
  if(!s||s<=0)return"0h00";
  return`${Math.floor(s/3600)}h${String(Math.floor((s%3600)/60)).padStart(2,'0')}`;
}
function initials(n){if(!n)return"?";return n.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();}
function padZ(n){return String(n).padStart(2,'0');}

function makeDemoHistory(userId){
  const today=new Date();
  const year=today.getFullYear(),month=today.getMonth();
  const days=new Date(year,month+1,0).getDate();
  const h={};
  for(let d=1;d<=days;d++){
    const dt=new Date(year,month,d);
    if(dt>today)break;
    const dow=dt.getDay();
    if(dow===0||dow===6)continue;
    const seed=(userId*13+d*7)%100;
    const k=`${year}-${padZ(month+1)}-${padZ(d)}`;
    if(seed<12){h[k]={statut:"absent"};}
    else{
      const rm=seed<25?Math.floor((seed%5)*3+1):0;
      const ds=seed>70?(seed%3+1)*120:0;
      const done=dt.getDate()<today.getDate();
      h[k]={statut:done?"offwork":"present",
             heure_arrivee:rm>0?`07:${padZ(40+rm)}`:"07:38",
             heure_depart:done?"18:27":"--:--",
             retard_min:rm,depassements_sec:ds,
             temps_effectif_sec:Math.max(0,38700-ds-rm*60)};
    }
  }
  return h;
}

// ===================== COMPONENTS =====================
function StatusBadge({statut,t}){
  if(statut==="present")return<span className="status-badge badge-present">● {t.present}</span>;
  if(statut==="pause")  return<span className="status-badge badge-pause">◐ {t.onBreak}</span>;
  if(statut==="offwork")return<span className="status-badge badge-offwork">✓ {t.offWorkDone}</span>;
  return<span className="status-badge badge-absent">○ {t.absent}</span>;
}

function BreakBanner({pause_courante,t}){
  const[tick,setTick]=useState(0);
  useEffect(()=>{const id=setInterval(()=>setTick(x=>x+1),1000);return()=>clearInterval(id);},[]);
  if(!pause_courante)return null;
  const{type,elapsed,limit,exceeded}=pause_courante;
  const info=BREAK_TYPES[type]||{emoji:"⏸",key:"short"};
  const live=elapsed+tick,over=live-limit;
  return(
    <div className="break-banner">
      <div className="break-banner-left">
        <div className="break-banner-emoji">{info.emoji}</div>
        <div>
          <div className="break-banner-label">{t[info.key]} {t.inProgress}</div>
          <div className="break-banner-since">{t.elapsed}: {fmtSec(live)} / {t.limit}: {fmtSec(limit)}</div>
        </div>
      </div>
      <div className="break-banner-right">
        {exceeded||over>0
          ?<span className="overdue">⚠ +{fmtSec(Math.max(over,0))} {t.overBy}</span>
          :<span>{t.remaining}: {fmtSec(Math.max(limit-live,0))}</span>}
      </div>
    </div>
  );
}

function MonthlyChart({data,t}){
  const ref=useRef(null),chartRef=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    if(chartRef.current){chartRef.current.destroy();chartRef.current=null;}
    const labels=data.map(r=>r.date),vals=data.map(r=>r.heures);
    const colors=data.map(r=>r.statut==="present"||r.statut==="offwork"?"rgba(34,211,122,0.65)":"rgba(240,78,94,0.35)");
    chartRef.current=new Chart(ref.current,{
      type:"bar",
      data:{labels,datasets:[{label:t.hoursWorked,data:vals,backgroundColor:colors,borderRadius:4,borderSkipped:false}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.raw}h`}}},
        scales:{x:{grid:{display:false},ticks:{color:"#888",font:{size:10}}},
                y:{min:0,max:12,ticks:{color:"#888",font:{size:10},callback:v=>`${v}h`},grid:{color:"rgba(128,128,128,0.08)"}}}}
    });
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[data]);
  return<canvas ref={ref}/>;
}

function CalendarView({emp,colorIdx,history,t}){
  const today=new Date();
  const[viewYear,setViewYear]=useState(today.getFullYear());
  const[viewMonth,setViewMonth]=useState(today.getMonth());
  const[selDay,setSelDay]=useState(null);
  function prevM(){if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}else setViewMonth(m=>m-1);setSelDay(null);}
  function nextM(){if(viewMonth===11){setViewMonth(0);setViewYear(y=>y+1);}else setViewMonth(m=>m+1);setSelDay(null);}
  const firstDay=new Date(viewYear,viewMonth,1);
  let sdow=firstDay.getDay()-1;if(sdow<0)sdow=6;
  const dim=new Date(viewYear,viewMonth+1,0).getDate();
  const dip=new Date(viewYear,viewMonth,0).getDate();
  const cells=[];
  for(let i=sdow-1;i>=0;i--)cells.push({day:dip-i,month:'prev'});
  for(let d=1;d<=dim;d++){
    const ds=`${viewYear}-${padZ(viewMonth+1)}-${padZ(d)}`;
    const dt=new Date(viewYear,viewMonth,d);
    cells.push({day:d,month:'cur',dateStr:ds,dt,weekend:dt.getDay()===0||dt.getDay()===6});
  }
  const rem=42-cells.length;for(let i=1;i<=rem;i++)cells.push({day:i,month:'next'});
  const selData=selDay&&history?history[selDay]:null;
  const monthStats=useMemo(()=>{
    if(!history)return{presents:0,absents:0,retards:0,totalSec:0};
    let p=0,a=0,r=0,ts=0;
    for(let d=1;d<=dim;d++){
      const k=`${viewYear}-${padZ(viewMonth+1)}-${padZ(d)}`;
      const h=history[k];if(!h)continue;
      if(h.statut==='absent')a++;else{p++;if(h.retard_min>0)r++;ts+=(h.temps_effectif_sec||0);}
    }
    return{presents:p,absents:a,retards:r,totalSec:ts};
  },[history,viewYear,viewMonth,dim]);
  return(
    <div>
      <div className="monthly-metrics" style={{marginBottom:16}}>
        <div className="metric-card green"><div className="metric-label">{t.daysPresent}</div><div className="metric-value green">{monthStats.presents}</div></div>
        <div className="metric-card red"><div className="metric-label">{t.daysAbsent}</div><div className="metric-value red">{monthStats.absents}</div></div>
        <div className="metric-card amber"><div className="metric-label">{t.delays}</div><div className="metric-value amber">{monthStats.retards}</div></div>
        <div className="metric-card blue"><div className="metric-label">{t.totalHours}</div><div className="metric-value blue">{fmtHM(monthStats.totalSec)}</div></div>
      </div>
      <div className="calendar-wrap">
        <div className="calendar-nav">
          <button className="cal-nav-btn" onClick={prevM}>‹</button>
          <div className="calendar-nav-title">{t.months[viewMonth]} {viewYear}</div>
          <button className="cal-nav-btn" onClick={nextM}>›</button>
        </div>
        <div className="legend-row">
          <div className="legend-item"><div className="legend-dot" style={{background:'var(--green)'}}></div>{t.present}</div>
          <div className="legend-item"><div className="legend-dot" style={{background:'var(--blue)'}}></div>{t.offWorkDone}</div>
          <div className="legend-item"><div className="legend-dot" style={{background:'var(--red)'}}></div>{t.absent}</div>
          <div className="legend-item"><div className="legend-dot" style={{background:'var(--amber)'}}></div>{t.delay}/{t.overruns}</div>
        </div>
        <div className="calendar-grid">
          {t.days.map(d=><div key={d} className="cal-day-header">{d}</div>)}
          {cells.map((cell,idx)=>{
            if(cell.month!=='cur')return<div key={idx} className="cal-day empty other-month"><span className="cal-day-num" style={{color:'var(--text3)'}}>{cell.day}</span></div>;
            const isToday=cell.dt&&cell.dt.toDateString()===today.toDateString();
            const isFuture=cell.dt&&cell.dt>today;
            const h=history&&history[cell.dateStr];
            let dc="cal-day",dot=null;
            if(cell.weekend)dc+=" day-weekend";
            else if(!isFuture&&h){
              if(h.statut==='absent'){dc+=" day-absent";dot="dot-absent-c";}
              else if(h.statut==='offwork'){dc+=" day-offwork";dot="dot-offwork-c";}
              else{dc+=" day-present";dot="dot-present-c";}
              if(h.retard_min>0||h.depassements_sec>0)dot="dot-offwork-c";
            }
            if(isToday)dc+=" today";
            if(selDay===cell.dateStr)dc+=" selected";
            return(
              <div key={idx} className={dc} onClick={()=>!cell.weekend&&!isFuture&&setSelDay(selDay===cell.dateStr?null:cell.dateStr)}>
                <span className="cal-day-num">{cell.day}</span>
                {dot&&!isFuture&&!cell.weekend&&<div className={`cal-day-dot ${dot}`}></div>}
              </div>
            );
          })}
        </div>
        {selDay&&(
          <div className="cal-detail">
            <div className="cal-detail-date">
              <span style={{fontSize:18}}>{selData?(selData.statut==='absent'?'❌':selData.retard_min>0||selData.depassements_sec>0?'⚠️':'✅'):'📅'}</span>
              {new Date(selDay+'T12:00:00').toLocaleDateString(undefined,{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
            </div>
            {!selData?<div style={{color:'var(--text3)',fontSize:13}}>{t.noData}</div>
             :selData.statut==='absent'?<div style={{color:'var(--red)',fontSize:13}}>{t.absentDay}</div>
             :<div className="cal-detail-grid">
                <div className="cal-detail-stat"><div className="cal-detail-stat-label">{t.arrivalTime}</div><div className="cal-detail-stat-val" style={{color:'var(--green)',fontFamily:'monospace'}}>{selData.heure_arrivee||'--:--'}</div></div>
                <div className="cal-detail-stat"><div className="cal-detail-stat-label">{t.departureTime}</div><div className="cal-detail-stat-val" style={{color:'var(--blue)',fontFamily:'monospace'}}>{selData.heure_depart||'--:--'}</div></div>
                <div className="cal-detail-stat"><div className="cal-detail-stat-label">{t.delay}</div><div className="cal-detail-stat-val" style={{color:selData.retard_min>0?'var(--red)':'var(--green)'}}>{selData.retard_min>0?`+${selData.retard_min} min`:t.none}</div></div>
                <div className="cal-detail-stat"><div className="cal-detail-stat-label">{t.overruns}</div><div className="cal-detail-stat-val" style={{color:selData.depassements_sec>0?'var(--amber)':'var(--green)'}}>{selData.depassements_sec>0?fmtSec(selData.depassements_sec):t.none}</div></div>
                <div className="cal-detail-stat"><div className="cal-detail-stat-label">{t.effectiveTime}</div><div className="cal-detail-stat-val" style={{color:'var(--blue)'}}>{fmtHM(selData.temps_effectif_sec)}</div></div>
                <div className="cal-detail-stat"><div className="cal-detail-stat-label">{t.status}</div><div className="cal-detail-stat-val" style={{fontSize:13}}>{selData.statut==='offwork'?<span style={{color:'var(--blue)'}}>{t.offWorkDone}</span>:<span style={{color:'var(--green)'}}>{t.stillPresent}</span>}</div></div>
              </div>}
          </div>
        )}
      </div>
    </div>
  );
}

function EmployeeMonthlyView({emp,colorIdx,history,t}){
  const[subTab,setSubTab]=useState("calendar");
  const today=new Date();
  const vy=today.getFullYear(),vm=today.getMonth();
  const dim=new Date(vy,vm+1,0).getDate();
  const rows=useMemo(()=>{
    const r=[];
    for(let d=1;d<=dim;d++){
      const dt=new Date(vy,vm,d);if(dt>today)continue;
      const dow=dt.getDay();if(dow===0||dow===6)continue;
      const k=`${vy}-${padZ(vm+1)}-${padZ(d)}`;
      const h=history&&history[k];
      r.push({date:`${padZ(d)}/${padZ(vm+1)}`,
              arrivee:h?(h.heure_arrivee||'--:--'):'--:--',
              depart:h?(h.heure_depart||'--:--'):'--:--',
              travail:h&&h.temps_effectif_sec?fmtHM(h.temps_effectif_sec):'--',
              heures:h&&h.temps_effectif_sec?Math.round(h.temps_effectif_sec/360)/10:0,
              retard:h?(h.retard_min||0):0,
              depass:h?(h.depassements_sec||0):0,
              statut:h?h.statut:'absent'});
    }
    return r;
  },[history,vy,vm,dim]);
  return(
    <div>
      <div className="sub-tab-bar">
        <button className={`sub-tab-btn ${subTab==='calendar'?'active':''}`} onClick={()=>setSubTab('calendar')}>📅 {t.calTitle}</button>
        <button className={`sub-tab-btn ${subTab==='chart'?'active':''}`}    onClick={()=>setSubTab('chart')}>📊 {t.chartTitle}</button>
        <button className={`sub-tab-btn ${subTab==='table'?'active':''}`}    onClick={()=>setSubTab('table')}>📋 {t.tableTitle}</button>
      </div>
      {subTab==='calendar'&&<CalendarView emp={emp} colorIdx={colorIdx} history={history} t={t}/>}
      {subTab==='chart'&&(
        <div className="chart-card">
          <div className="chart-card-title">{t.hoursWorked} — {t.months[vm]} {vy}</div>
          <div style={{display:"flex",gap:14,marginBottom:10,fontSize:11,color:"var(--text3)"}}>
            <span><span style={{display:"inline-block",width:10,height:10,borderRadius:2,background:"rgba(34,211,122,0.65)",marginRight:4}}></span>{t.present}</span>
            <span><span style={{display:"inline-block",width:10,height:10,borderRadius:2,background:"rgba(240,78,94,0.35)",marginRight:4}}></span>{t.absent}</span>
          </div>
          <div className="chart-wrap"><MonthlyChart data={rows} t={t}/></div>
        </div>
      )}
      {subTab==='table'&&(
        <div className="monthly-table-wrap">
          <div className="monthly-table-header">
            <span>{t.detailTitle} — {t.months[vm]} {vy}</span>
            <span style={{fontSize:11,color:'var(--text3)'}}>{rows.filter(r=>r.statut!=='absent').length} {t.workingDays}</span>
          </div>
          <table className="monthly-table">
            <thead><tr><th>{t.date}</th><th>{t.arrivalTime}</th><th>{t.departureTime}</th><th>{t.travelDur}</th><th>{t.delay}</th><th>{t.overruns}</th><th>{t.status}</th></tr></thead>
            <tbody>
              {rows.map((r,i)=>(
                <tr key={i}>
                  <td style={{fontWeight:500}}>{r.date}</td>
                  <td style={{fontFamily:'monospace'}}>{r.arrivee}</td>
                  <td style={{fontFamily:'monospace'}}>{r.depart}</td>
                  <td>{r.travail}</td>
                  <td>{r.retard>0?<span className="exceeded-pill">+{r.retard}min</span>:<span className="ok-pill">—</span>}</td>
                  <td>{r.depass>0?<span className="exceeded-pill">+{fmtSec(r.depass)}</span>:<span className="ok-pill">—</span>}</td>
                  <td>{r.statut==='offwork'?<span className="ok-pill" style={{background:'var(--blue-bg)',borderColor:'var(--blue-b)',color:'var(--blue)'}}>Off Work</span>
                      :r.statut!=='absent'?<span className="ok-pill">{t.present}</span>
                      :<span className="exceeded-pill">{t.absent}</span>}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function SettingsPanel({dark,setDark,lang,setLang,t,onClose}){

    function handler(e){if(ref.current&&!ref.current.contains(e.target))onClose();}
    document.addEventListener('mousedown',handler);
    return()=>document.removeEventListener('mousedown',handler);
  },[onClose]);
  return(
    <div className="settings-wrap" ref={ref}>
      <div className="settings-panel">
        <div>
          <div className="sp-title">{t.settingsTitle}</div>
        </div>
        <div>
          <div className="sp-title">{t.darkMode}</div>

            </label>
          </div>
        </div>
        <div>

    </div>
  );
}

  // Persist prefs
  useEffect(()=>{
    try{const s=JSON.parse(localStorage.getItem("bm_prefs")||"{}");
      if(s.dark!==undefined)setDark(s.dark);
      if(s.lang)setLang(s.lang);}
    catch{}
  },[]);
  useEffect(()=>{
    try{localStorage.setItem("bm_prefs",JSON.stringify({dark,lang}));}catch{}
  },[dark,lang]);

  const employes=data?.employes||[];
  const selected=employes[selIdx]||employes[0];
  const colorMap=useMemo(()=>{const m={};employes.forEach((e,i)=>{m[e.user_id]=avatarColor(i);});return m;},[employes]);
  const[histories,setHistories]=useState({});
  useEffect(()=>{
    if(isDemo&&employes.length>0){
      const h={};employes.forEach(e=>{h[e.user_id]=makeDemoHistory(e.user_id);});setHistories(h);
    }
  },[isDemo,data]);

  const fetchData=useCallback(async(url)=>{
    setLoading(true);setError(null);
    try{
      const ctrl=new AbortController();
      const tid=setTimeout(()=>ctrl.abort(),9000);
      const res=await fetch(url,{cache:"no-store",signal:ctrl.signal});
      clearTimeout(tid);
      if(!res.ok)throw new Error(`HTTP ${res.status}`);
      const json=await res.json();
      apiEverOk.current=true;setData(json);setIsDemo(false);
    }catch(e){
      const reason=e.name==="AbortError"?"timeout":e.message;
      setError(`${t.apiErr}: ${reason}`);
      if(!apiEverOk.current){setData(makeDemoData());setIsDemo(true);}
    }finally{setLoading(false);}
  },[t]);

  useEffect(()=>{fetchData(apiUrl);},[]);
  useEffect(()=>{const id=setInterval(()=>fetchData(apiUrl),15000);return()=>clearInterval(id);},[apiUrl,fetchData]);
  const handleApply=()=>{setApiUrl(inputUrl);fetchData(inputUrl);};

  return(
    <div>
      {/* TOPBAR */}
      <div className="topbar">
        <AppLogo t={t}/>
        <div className="topbar-center">
          <div className="tab-pill">
            <button className={tab==="daily"  ?"active":""} onClick={()=>setTab("daily")}>{t.tabDaily}</button>
            <button className={tab==="results"?"active":""} onClick={()=>setTab("results")}>{t.tabResults}</button>
            <button className={tab==="monthly"?"active":""} onClick={()=>setTab("monthly")}>{t.tabMonthly}</button>
          </div>
        </div>
        <div className="topbar-right">
          <div className="live-indicator">
            <div className="live-dot"/>
            {isDemo?t.demo:t.live}
          </div>
          {/* Refresh */}
          <button className={`icon-btn sq ${loading?"spin":""}`} onClick={()=>fetchData(apiUrl)} title="Refresh">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
              <path d="M23 4v6h-6M1 20v-6h6"/>
              <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
            </svg>
          </button>
          {/* Settings gear */}
          <div style={{position:'relative'}}>
            <button className="icon-btn sq" onClick={()=>setShowSettings(s=>!s)} title={t.settingsTitle}>⚙️</button>
            {showSettings&&<SettingsPanel dark={dark} setDark={setDark} lang={lang} setLang={setLang} t={t} onClose={()=>setShowSettings(false)}/>}
          </div>
        </div>
      </div>

      <div className="app-shell">
        {/* SIDEBAR */}
        <div className="sidebar">
          <div style={{padding:"0 4px 12px"}}>
            <div className="section-title">{t.apiLabel}</div>
            <div className="config-bar">
              <input value={inputUrl} onChange={e=>setInputUrl(e.target.value)}
                placeholder="https://your-bot.onrender.com/api/stats"
                onKeyDown={e=>e.key==="Enter"&&handleApply()}/>
              <button className="apply-btn" onClick={handleApply}>{t.connectBtn}</button>
            </div>
            {isDemo&&<div style={{fontSize:10,color:"var(--text3)",marginTop:6,padding:"0 2px"}}>{t.demoNote}</div>}
          </div>
          <div className="sidebar-label">{t.employees} ({employes.length})</div>
          {employes.map((e,i)=>{
            const ac=avatarColor(i);
            return(
              <div key={e.user_id} className={`user-row ${selIdx===i?"active":""}`} onClick={()=>setSelIdx(i)}>
                <div className="user-avatar" style={{background:ac.bg,color:ac.color}}>{initials(e.nom)}</div>
                <div className="user-row-info">
                  <div className="user-row-name">{e.nom}</div>
                  <div className="user-row-id">#{e.user_id}</div>
                </div>
                <div className={`status-dot ${e.statut==="present"?"dot-present":e.statut==="pause"?"dot-pause":"dot-absent"}`}/>
              </div>
            );
          })}
        </div>

        {/* MAIN */}
        <div className="main-content">
          {error&&<div className="error-banner">⚠ {error}</div>}

          {data===null&&loading&&(
            <div className="empty-state">
              <div className="empty-icon" style={{animation:"spin 1s linear infinite",display:"inline-block"}}>↻</div>
              <div className="empty-text">{t.connecting}</div>
            </div>
          )}

          {data!==null&&!isDemo&&employes.length===0&&(
            <div className="empty-state">
              <div className="empty-icon">🟢</div>
              <div className="empty-text" style={{textAlign:'center'}}>
                {t.botConnected}<br/>
                <span style={{fontSize:12,color:'var(--text3)'}}>{t.botConnectedSub}</span>
              </div>
            </div>
          )}

          {/* DAILY */}
          {tab==="daily"&&selected&&<DailyView emp={selected} colorIdx={selIdx} t={t}/>}
          {tab==="daily"&&!selected&&data!==null&&employes.length===0&&!loading&&(
            <div className="empty-state"><div className="empty-icon">👥</div><div className="empty-text">{t.noEmp}</div></div>
          )}

          {/* RESULTS */}
          {tab==="results"&&(
            <div>
              <OffWorkPanel employes={employes} colorMap={colorMap} t={t}/>
              <div className="monthly-table-wrap">
                <div className="monthly-table-header"><span>{t.recapAll}</span></div>
                <table className="monthly-table">
                  <thead><tr><th>{t.employee}</th><th>{t.status}</th><th>{t.arrivalTime}</th><th>{t.departureTime}</th><th>{t.netWork2}</th><th>{t.delay}</th><th>{t.overruns2}</th><th>{t.pauses2}</th></tr></thead>
                  <tbody>
                    {employes.map((e,i)=>{
                      const ac=avatarColor(i);
                      return(
                        <tr key={e.user_id} onClick={()=>{setSelIdx(i);setTab('daily');}} style={{cursor:'pointer'}}>
                          <td><div style={{display:'flex',alignItems:'center',gap:8}}>
                            <div style={{width:26,height:26,borderRadius:7,background:ac.bg,color:ac.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,flexShrink:0}}>{initials(e.nom)}</div>
                            <span style={{fontWeight:500}}>{e.nom}</span>
                          </div></td>
                          <td>{e.statut==="present"?<span className="ok-pill">{t.present}</span>
                              :e.statut==="pause"?<span className="ok-pill" style={{background:'var(--amber-bg)',borderColor:'var(--amber-b)',color:'var(--amber)'}}>{t.onBreak}</span>
                              :<span className="exceeded-pill">{t.absent}</span>}</td>
                          <td style={{fontFamily:'monospace'}}>{e.heure_arrivee}</td>
                          <td style={{fontFamily:'monospace'}}>{e.heure_depart}</td>
                          <td>{e.temps_effectif_sec>0?fmtHM(e.temps_effectif_sec):'—'}</td>
                          <td>{e.retard_min>0?<span className="exceeded-pill">+{e.retard_min}min</span>:<span className="ok-pill">—</span>}</td>
                          <td>{e.depassements_sec>0?<span className="exceeded-pill">+{fmtSec(e.depassements_sec)}</span>:<span className="ok-pill">—</span>}</td>
                          <td style={{color:'var(--text3)'}}>{e.departs_temporaires.count}× · {fmtSec(e.pauses_total_sec)}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* MONTHLY */}
          {tab==="monthly"&&selected&&(
            <div>
              <div className="profile-header" style={{marginBottom:18}}>
                <div className="profile-left">
                  <div className="profile-avatar" style={{background:avatarColor(selIdx).bg,color:avatarColor(selIdx).color}}>{initials(selected.nom)}</div>
                  <div>
                    <div className="profile-name">{selected.nom}</div>
                    <div className="profile-uid">{t.monthlySub} {selected.user_id}</div>
                  </div>
                </div>
                <div className="profile-right"><StatusBadge statut={selected.statut} t={t}/></div>
              </div>
              <EmployeeMonthlyView emp={selected} colorIdx={selIdx} history={histories[selected.user_id]||{}} t={t}/>
            </div>
          )}
          {tab==="monthly"&&!selected&&data!==null&&(
            <div className="empty-state"><div className="empty-icon">📅</div><div className="empty-text">{t.selectEmp}</div></div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
